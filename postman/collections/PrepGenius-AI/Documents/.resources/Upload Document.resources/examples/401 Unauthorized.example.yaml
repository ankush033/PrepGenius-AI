$kind: http-example
name: '401 Unauthorized'
request:
  url: 'http://localhost:5000/api/documents/upload'
  method: POST
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    - key: Content-Type
      value: application/json
  body:
    type: json
    content: |-
      {
        "success": false,
        "message": "Access Denied. No token provided."
      }
