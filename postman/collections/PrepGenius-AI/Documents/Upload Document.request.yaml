$kind: http-request
name: Upload Document
method: POST
url: 'http://localhost:5000/api/documents/upload'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
body:
  type: formdata
  content:
    - key: pdf
      type: file
      src: ''
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Test 1: Successful upload - Status 201
      pm.test("Status code is 201 on successful upload", function () {
          pm.response.to.have.status(201);
      });

      // Test 2: Response has success flag true
      pm.test("Response has success: true", function () {
          const json = pm.response.json();
          pm.expect(json.success).to.be.true;
      });

      // Test 3: Response contains expected message
      pm.test("Response message is correct", function () {
          const json = pm.response.json();
          pm.expect(json.message).to.eql("PDF Uploaded & Indexed Successfully");
      });

      // Test 4: Response contains totalChunks as a number
      pm.test("Response contains totalChunks as a number", function () {
          const json = pm.response.json();
          pm.expect(json.totalChunks).to.be.a("number");
      });

      // Test 5: Response contains vectorsStored as a number
      pm.test("Response contains vectorsStored as a number", function () {
          const json = pm.response.json();
          pm.expect(json.vectorsStored).to.be.a("number");
      });

      // Test 6: Response contains document object
      pm.test("Response contains document object", function () {
          const json = pm.response.json();
          pm.expect(json.document).to.be.an("object");
      });

      // Test 7: Document has required fields
      pm.test("Document has fileName, originalName, namespace, and user fields", function () {
          const doc = pm.response.json().document;
          pm.expect(doc).to.have.property("fileName");
          pm.expect(doc).to.have.property("originalName");
          pm.expect(doc).to.have.property("namespace");
          pm.expect(doc).to.have.property("user");
      });

      // Test 8: Document has _id
      pm.test("Document has _id", function () {
          const doc = pm.response.json().document;
          pm.expect(doc).to.have.property("_id");
      });

      // Test 9: Response time is acceptable
      pm.test("Response time is less than 30000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(30000);
      });

      // Test 10: Content-Type is JSON
      pm.test("Content-Type is application/json", function () {
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });
examples: './.resources/Upload Document.resources/examples'
